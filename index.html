<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visuals Art — Photo Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 2.5rem 2rem 1rem;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.1em; color: #fff; }
    header p  { margin-top: 0.4rem; color: #888; font-size: 0.9rem; }

    /* ── Nav ── */
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      padding: 1.2rem 2rem;
      background: #161616;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #222;
    }
    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.9rem;
      border: 1px solid #333;
      border-radius: 999px;
      transition: all 0.2s;
    }
    nav a:hover { color: #fff; border-color: #666; background: #222; }

    /* ── Section ── */
    .album {
      padding: 2.5rem 2rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .album-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .album-header h2 { font-size: 1.3rem; font-weight: 400; color: #ddd; }
    .album-header .count { color: #555; font-size: 0.85rem; }
    .breadcrumb {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 0.4rem;
      font-family: monospace;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 6px;
    }
    .grid a {
      display: block;
      aspect-ratio: 1;
      overflow: hidden;
      background: #1a1a1a;
      border-radius: 4px;
      cursor: pointer;
    }
    .grid a img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.25s, opacity 0.25s;
      opacity: 0.85;
    }
    .grid a:hover img { transform: scale(1.06); opacity: 1; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.active { display: flex; }

    #lb-img {
      max-width: 92vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    #lb-caption {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: #777;
      font-family: monospace;
      max-width: 92vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #lb-close {
      position: fixed;
      top: 1rem; right: 1.2rem;
      font-size: 2rem;
      color: #aaa;
      cursor: pointer;
      line-height: 1;
      background: none;
      border: none;
      transition: color 0.15s;
    }
    #lb-close:hover { color: #fff; }

    #lb-prev, #lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #aaa;
      cursor: pointer;
      background: rgba(0,0,0,0.4);
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      user-select: none;
    }
    #lb-prev { left: 0.8rem; }
    #lb-next { right: 0.8rem; }
    #lb-prev:hover, #lb-next:hover { color: #fff; background: rgba(255,255,255,0.12); }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 4px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Visuals Art</h1>
  <p>Photo Gallery</p>
</header>

<nav id="nav"></nav>

<main id="gallery"></main>

<div id="lightbox">
  <button id="lb-close" onclick="closeLb()" title="Close">&#x2715;</button>
  <button id="lb-prev" onclick="stepLb(-1)" title="Previous">&#x2039;</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-caption"></div>
  <button id="lb-next" onclick="stepLb(1)" title="Next">&#x203a;</button>
</div>

<script>
  let currentSection = [];
  let currentIndex = 0;

  function encodePath(p) {
    return p.split('/').map(seg => encodeURIComponent(seg)).join('/');
  }

  function buildGallery(categories) {
    const nav = document.getElementById('nav');
    const gallery = document.getElementById('gallery');

    categories.forEach(cat => {
      const navLink = document.createElement('a');
      navLink.href = `#${cat.id}`;
      navLink.textContent = `${cat.name} (${cat.images.length})`;
      nav.appendChild(navLink);

      const section = document.createElement('section');
      section.className = 'album';
      section.id = cat.id;

      const breadcrumb = document.createElement('div');
      breadcrumb.className = 'breadcrumb';
      breadcrumb.textContent = cat.breadcrumb;

      const header = document.createElement('div');
      header.className = 'album-header';
      header.innerHTML = `<h2>${cat.name}</h2><span class="count">${cat.images.length} photos</span>`;

      const grid = document.createElement('div');
      grid.className = 'grid';

      cat.images.forEach(rawPath => {
        const encoded = encodePath(rawPath);
        const a = document.createElement('a');
        a.href = '#';
        a.dataset.path = rawPath;
        a.addEventListener('click', e => {
          e.preventDefault();
          const allAnchors = Array.from(grid.querySelectorAll('a'));
          currentSection = allAnchors.map(el => el.dataset.path);
          currentIndex = currentSection.indexOf(rawPath);
          showImage(rawPath);
        });

        const img = document.createElement('img');
        img.src = encoded;
        img.loading = 'lazy';
        img.alt = '';

        a.appendChild(img);
        grid.appendChild(a);
      });

      section.appendChild(breadcrumb);
      section.appendChild(header);
      section.appendChild(grid);
      gallery.appendChild(section);
    });
  }

  function showImage(path) {
    document.getElementById('lb-img').src = encodePath(path);
    document.getElementById('lb-caption').textContent = decodeURIComponent(path.split('/').pop());
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lb-img').src = '';
  }

  function stepLb(dir) {
    currentIndex = (currentIndex + dir + currentSection.length) % currentSection.length;
    showImage(currentSection[currentIndex]);
  }

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') stepLb(-1);
    if (e.key === 'ArrowRight') stepLb(1);
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLb();
  });

  fetch('gallery-data.json')
    .then(r => r.json())
    .then(buildGallery)
    .catch(() => {
      document.getElementById('gallery').innerHTML =
        '<p style="text-align:center;color:#666;padding:3rem">Gallery data not found. Push your images and wait for the GitHub Action to run.</p>';
    });
</script>

</body>
</html>
