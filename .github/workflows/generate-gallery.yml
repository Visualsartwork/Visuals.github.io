name: Generate Gallery Data

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate gallery-data.json
        run: python generate-gallery.py

      - name: Commit and push gallery data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery-data.json
          git diff --staged --quiet || git commit -m "Auto-update gallery data [skip ci]"
          git push
